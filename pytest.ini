[pytest]
# Configuración de pytest para el proyecto

# Directorio donde se encuentran los tests
testpaths = tests

# Patrón para descubrir archivos de tests
python_files = test_*.py

# Patrón para descubrir clases de tests
python_classes = Test*

# Patrón para descubrir funciones de tests
python_functions = test_*

# Opciones por defecto al ejecutar pytest
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Marcadores personalizados (si necesitas)
markers =
    slow: marca tests que son lentos
    integration: marca tests de integración
    unit: marca tests unitarios

# Configuración de cobertura (si usas pytest-cov)
# addopts = -v --cov=src --cov-report=html --cov-report=term-missing
